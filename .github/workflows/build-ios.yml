name: Build HelloGluon for iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS Application
    runs-on: macos-latest

    steps:
      - name: Checkout gluon-samples
        uses: actions/checkout@v4
        with:
          repository: 'gluonhq/gluon-samples'

      - name: Setup Gluon GraalVM
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          arch: aarch64
      - name: Restore Maven packages
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build with Maven (iOS Simulator)
        working-directory: ./HelloGluon
        run: mvn -Pios clean gluonfx:build
      - name: Save Maven packages
        uses: actions/cache/save@v4
        if: always() # Das zwingt GitHub, den Cache auch nach einem Build-Fehler zu speichern
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}        
      # - name: Upload App Artifact
      #   uses: actions/upload-artifact@v4
